<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Genie Admin — Login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-eyebrow">Control Center</div>
      <h1>Genie.pk Admin Panel</h1>
      <p class="sub">Group 2 — Secure Authentication Gate</p>

      <form id="loginForm">
        <label for="username">Username</label>
        <input type="text" id="username" autocomplete="username" required />

        <label for="password">Password</label>
        <input type="password" id="password" autocomplete="current-password" required />

        <button type="submit" class="btn-primary">Log In</button>
        <div class="error-msg" id="errorMsg"></div>
      </form>

      <div class="hint">
        default seed credentials → admin / admin123<br />
        (set in .env, then run <code>npm run seed</code>)
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById("loginForm");
    const errorMsg = document.getElementById("errorMsg");

    // If already logged in, skip straight to dashboard
    fetch("/api/auth/status")
      .then((r) => r.json())
      .then((data) => {
        if (data.loggedIn) window.location.href = "dashboard.html";
      });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errorMsg.textContent = "";
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;

      try {
        const res = await fetch("/api/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json();
        if (data.success) {
          window.location.href = "dashboard.html";
        } else {
          errorMsg.textContent = data.message || "Login failed.";
        }
      } catch (err) {
        errorMsg.textContent = "Could not reach the server.";
      }
    });
  </script>
</body>
</html>
